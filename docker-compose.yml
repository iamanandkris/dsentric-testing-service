services:
  postgres:
    image: postgres:15
    container_name: dsentric-postgres
    environment:
      POSTGRES_DB: testservice
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d testservice"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dsentric-testing-service
    environment:
      SERVER_PORT: 8080
      DB_URL: jdbc:postgresql://postgres:5432/testservice
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_POOL_SIZE: 10
      APP_BASE_URL: http://app:8080
      SEED_USERS: 500
      SEED_PRODUCTS: 1000
      SEED_ORDERS: 2000
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"

volumes:
  postgres-data:
